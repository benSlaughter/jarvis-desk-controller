; PlatformIO configuration for Jarvis Desk Controller
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; Serial monitor baud rate (matches Serial.begin in main.cpp)
monitor_speed = 115200

; Build flags
build_flags =
    -Wall
    -Wextra

[env:native]
platform = native
build_flags =
    -Wall
    -Wextra
    -I test/test_native/mock_arduino
test_filter = test_native
test_build_src = true
build_src_filter = +<jarvis_protocol.cpp> +<jarvis_desk.cpp> -<main.cpp>
