; PlatformIO configuration for Jarvis Desk Controller
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; Serial monitor baud rate (matches Serial.begin in main_uno.cpp)
monitor_speed = 115200

; Build flags
build_flags =
    -Wall
    -Wextra

; Include all sources except ESP32 main
build_src_filter = +<*> -<main_esp32.cpp>

[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
build_src_filter = +<*> -<main_uno.cpp>
build_flags =
    -Wall
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:native]
platform = native
build_flags =
    -Wall
    -Wextra
    -I test/test_native/mock_arduino
test_filter = test_native
test_build_src = true
build_src_filter = +<jarvis_protocol.cpp> +<jarvis_desk.cpp> -<main_uno.cpp> -<main_esp32.cpp>
